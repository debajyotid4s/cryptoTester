<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoAlgo Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>CryptoAlgo Tester</h1>
      <p class="subtitle">Cryptographic Algorithm Playground</p>
    </header>

    <div class="algo-selector">
      <label>Select Algorithm</label>
      <select id="algo-select">
        <option value="hill">Hill Cipher (2×2)</option>
        <option value="caesar">Caesar Cipher</option>
        <option value="playfair">Playfair Cipher</option>
        <option value="vigenere">Vigenère Cipher</option>
      </select>
      <button type="button" id="sample-btn" class="sample-btn">Sample</button>
    </div>

    <div class="main-grid">
      <section class="card in-col">
        <div class="field">
          <label for="input-text">Plaintext / Ciphertext</label>
          <textarea id="input-text" placeholder="Enter text (A-Z only)"></textarea>
          <div class="samples">
            <button type="button" data-input="HELLO">HELLO</button>
            <button type="button" data-input="LATEYX">LATEYX</button>
            <button type="button" data-input="ATTACKATDAWN">ATTACKATDAWN</button>
          </div>
        </div>

        <div class="field">
          <label>Key Matrix (2×2)</label>
          <div class="matrix">
            <input type="number" id="m00" value="3">
            <input type="number" id="m01" value="3">
            <input type="number" id="m10" value="2">
            <input type="number" id="m11" value="5">
          </div>
        </div>

        <div class="field" id="pad-char-field">
          <label for="pad-char">Padding Character</label>
          <input type="text" id="pad-char" maxlength="1" value="X">
        </div>

        <div class="field" id="shift-field" style="display:none;">
          <label for="shift">Shift</label>
          <input type="number" id="shift" value="3" min="1" max="25">
        </div>

        <div class="field" id="key-field" style="display:none;">
          <label for="key">Key</label>
          <input type="text" id="key" value="CIPHER" maxlength="25">
        </div>

        <div class="check-row" id="strip-padding-row">
          <input type="checkbox" id="strip-padding" checked>
          <span>Strip trailing padding</span>
        </div>

        <div class="btn-row">
          <button id="encrypt-btn">Encrypt</button>
          <button id="decrypt-btn">Decrypt</button>
        </div>
      </section>

      <div class="swap-col">
        <button id="swap-btn" type="button" title="Output → Input">⇄</button>
      </div>

      <section class="card out-col">
        <div id="error-container"></div>
        <div class="field">
          <label for="output-text">Output</label>
          <div class="out-wrap">
            <textarea id="output-text" readonly placeholder="Result will appear here"></textarea>
            <button id="copy-btn" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>

        <details class="key-factors">
          <summary>Key Factors</summary>
          <div class="kf-panel" id="key-factors-content"></div>
        </details>
      </section>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toast-message"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
